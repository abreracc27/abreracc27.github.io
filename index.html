<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Montserrat:wght@500&display=swap" rel="stylesheet">

    
    <title>Valentine Special</title>

    <style>
        html, body{
            padding: 0;
            margin: 0;
            overflow: hidden;
            
        }

        .container-fluid{
            display: grid;
            height: 100vh;
            align-items: center;
            /* width: 100%; */
        }

        .gif-div{
            height: 10vw;
            width: 10vw;
        }

        #v-message{
            font-size: calc(1.375rem + 2.5vw);
        }
        .v-message-box{
            /* font-size: calc(1.375rem + 2.5vw); */
            border: 10px dotted white;
            background-color: rgb(255, 84, 112);
        }

        span.a{
            font-family: 'Montserrat', sans-serif;
        }

        span.b{
            font-family: 'Dancing Script', cursive;
            color: white;
        }

        .btn{
            font-size: 1.5vw;
        }

        @media only screen and (max-width: 767px) {
            .gif-div{
                height: 30vw;
                width: 30vw;
            }

            .v-message-box{
                font-size: calc(1.375rem + 4vw);
            }

            .btn{
                font-size: 3vw;
                min-height: 50px;
            }

            .helper{
                font-size: 10px;
            }
        }

       

    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container-fluid px-0 ">
        <div class="row">
            <div class="col-12">
                <div class="row justify-content-center">
                    <div class="col-10 col-sm-10 col-md-10 col-lg-8 col-xl-8">
                        <div class="row justify-content-center text-center" id="">
                            <div class="col-12 mb-3">
                                <img class="gif-div" src="assets/gif/asking-cat.gif">
                            </div>
                            <div class="col-12 v-message-box p-3" id="v-message">
                                <!-- <span class="a">Will you be my </span><span class="b">Valentine?</span> -->
                            </div>

                            <div class="col-12 mt-5" id="btn-group">
                                <div class="row justify-content-center">
                                    <div class="col-5 col-sm-5 col-md-5 col-lg-4 col-xl-3">
                                        <button type="button" class="btn btn-primary w-100 h-100" id="btn-yes">Yes</button>
                                    </div>
                                    <div class="col-5 col-sm-5 col-md-5 col-lg-4 col-xl-3">
                                        <button type="button" class="btn btn-danger w-100 h-100" id="btn-no" >No</button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 mt-5 d-none" id="btn-group2">
                                <div class="row justify-content-center mb-2">
                                    <div class="col-5 col-sm-5 col-md-5 col-lg-4 col-xl-3" >
                                        <span class="helper">(Hold button for 5 seconds)</span>
                                    </div>
                                    <div class="col-5 col-sm-5 col-md-5 col-lg-4 col-xl-3"></div>
                                </div>

                                <div class="row justify-content-center">
                                    <div class="col-5 col-sm-5 col-md-5 col-lg-4 col-xl-3" id="btn-yes2">
                                        <button type="button" class="btn btn-primary w-100 h-100" id="btn-yes2">Yes</button>
                                    </div>
                                    <div class="col-5 col-sm-5 col-md-5 col-lg-4 col-xl-3" >
                                        <button type="button" class="btn btn-danger w-100 h-100" id="btn-no2">No</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function(){

            console.log('hi');

            // Typewritter effect

            // var str = '#<#Hello, world! My name is #CC#. I am a #Software Developer#.#/>#'; // Special character # used as a delimiter for highlighting

            var str = '$Will you be my$ #Valentine?#';

            var a = 0;
            var b = 0;
            var highlight = 0;

            var spans = '<span>' + str.split('').join('</span><span>') + '</span>';

            $(spans).hide().appendTo('.v-message-box').each(function (i) {
                switch($(this).html()){
                    case '$':
                        switch(a){
                            case 0:
                                a = 1;
                                break;
                            case 1:
                                ba= 0;
                        }
                        $(this).remove();
                        break;
                    case '#':
                        switch(b){
                            case 0:
                                b = 1;
                                break;
                            case 1:
                                b = 0;
                        }
                        $(this).remove();
                        break;
                }

                if(a == 1)
                {
                    $(this).addClass('a');
                }

                if(b == 1)
                {
                    $(this).addClass('b');
                }

                $(this).delay(50 * i).css({
                    display: 'inline',
                    opacity: 0
                }).animate({
                    opacity: 1
                }, 100);

            });
            

            $('#btn-yes').on('click', function() {
                $(".gif-div").attr("src","assets/gif/excited-cat.gif");
                $(".gif-div").attr("style","object-fit: cover; object-position: 100% 35%;");

                $("#v-message").empty();
                $("#v-message").removeClass('v-message-box');
                $("#btn-group").remove();

                $("#v-message").append('<span class="a">Woot! Woot!</span>');
            });

            $('#btn-no').on('click', function() {
                $('#btn-group').addClass('d-none');
                $('#btn-group2').removeClass('d-none');

                $(".gif-div").attr("src","assets/gif/sad-sad-cat.gif");

                $("#v-message").empty();
                $("#v-message").removeClass('v-message-box');
                // $("#btn-group").remove();

                $("#v-message").append('<span class="a">Are you sure?</span>');
            });


            var holdTimeout;

            $('#btn-yes2').on('mousedown touchstart', function(event) {
                event.preventDefault();

                var initialX = event.pageX || event.originalEvent.touches[0].pageX;
                var initialY = event.pageY || event.originalEvent.touches[0].pageY;

                $(".gif-div").attr("src","assets/gif/grumpy-cat-cat-meme.gif");
                $(".gif-div").attr("style","object-fit: cover; object-position: 100% 20%;");

                holdTimeout = setTimeout(function() {
                    // Your code for long-press
                    $('#btn-group').addClass('d-none');
                    $('#btn-group2').addClass('d-none');

                    $(".gif-div").attr("src","assets/gif/crying-cat.gif");
                    $(".gif-div").attr("style","object-fit: cover;");

                    $("#v-message").empty();
                    $("#v-message").removeClass('v-message-box');

                    $("#v-message").append('<span class="a">Okay :(</span>');

                    $(document).off('mousemove touchmove');
                    // alert("Button held!");
                }, 5000);


                $(document).on('mousemove touchmove', function(event) {
                    var currentX = event.pageX || event.originalEvent.touches[0].pageX;
                    var currentY = event.pageY || event.originalEvent.touches[0].pageY;

                    // Calculate the distance moved
                    var deltaX = Math.abs(currentX - initialX);
                    var deltaY = Math.abs(currentY - initialY);

                    // If the user moves a significant distance, reset the timeout
                    if (deltaX > 50 || deltaY > 50) {
                        clearTimeout(holdTimeout);
                        $(document).off('mousemove touchmove');

                        $(".gif-div").attr("src","assets/gif/sad-sad-cat.gif");
                        $(".gif-div").removeAttr("style");
                        // alert("Button moved!");

                    }
                });
                
            }).on('mouseup touchend', function() {
                clearTimeout(holdTimeout);
                $(document).off('mousemove touchmove');
                $(".gif-div").attr("src","assets/gif/sad-sad-cat.gif");
                $(".gif-div").removeAttr("style");

                // return;
                // alert("Button released!");
            });
    

            $('#btn-no2').on('click', function(){
                location.reload();
            });

        });


    </script>
</body>
</html>
